name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy static site
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portfolio_red
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d portfolio_red"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/portfolio_red?schema=public
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/portfolio_red?schema=public
        run: |
          pnpm --filter @repo/database build
          pnpm --filter @repo/database db:deploy
          pnpm --filter @repo/database db:seed

      - name: Build static site for GitHub Pages
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_STATIC_EXPORT: "true"
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/portfolio_red?schema=public
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/portfolio_red?schema=public
        run: pnpm exec turbo build --filter=web

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/web/out
          publish_branch: gh-pages

      - name: Publish site URL
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pages_url="https://ifaridaiman.github.io/portfolio-red/"
          if gh api "repos/${{ github.repository }}/pages" >/dev/null 2>&1; then
            echo "Site URL: $pages_url"
          else
            echo "::warning::Static files were pushed to the gh-pages branch, but GitHub Pages is not enabled yet."
            echo "::warning::Open https://github.com/${{ github.repository }}/settings/pages"
            echo "::warning::Set Source to 'Deploy from a branch', branch 'gh-pages', folder '/ (root)'."
            echo "::warning::After saving, the site will be available at $pages_url"
          fi
