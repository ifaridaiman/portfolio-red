services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: portfolio-red-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
      POSTGRES_DB: portfolio_red
    volumes:
      - portfolio_red_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio_red"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  portfolio_red_pgdata:
